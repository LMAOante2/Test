<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="login-screen">
            <h1>Login</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="signup()">Sign Up</button>
            <p id="auth-error"></p>
        </div>
        <div id="info-screen" style="display: none;">
    <h2 id="info-device-name"></h2>
    <p id="info-sensor"></p>
    <div id="control-section" style="display: none;">
        <button id="toggle-button">Toggle</button>
    </div>
    <button class="back" onclick="showMainScreen()"><i class="fa-solid fa-arrow-left backicon" ></i></button>
</div>

        <div id="main-screen" style="display: none;">
            <div id="device-list"></div>
            <div id="add-device-modal" style="display: none;">
                <h2>Add Device</h2>
                <input type="text" id="home-ssid" placeholder="Home WiFi SSID">
                <div class="password-container">
                <input type="password" id="home-password" placeholder="Home WiFi Password">
                <i class="fa-solid fa-eye toggle-password"></i>
                </div>
                <input type="text" id="device-name" placeholder="Device Name (optional)">
                <button onclick="addDevice()">Submit</button>
                <button onclick="hideAddDeviceForm()">Cancel</button>
                <p id="add-error"></p>
            </div>
        </div>

                <div id="settings-screen" style="display: none;">
            <button class="logoutbtn" onclick="logout()"> Logout</button>
            <div id="device-list"></div>
            <div id="add-device-modal" style="display: none;">
                <h2>Add Device</h2>
                <input type="text" id="home-ssid" placeholder="Home WiFi SSID">

                <input type="text" id="device-name" placeholder="Device Name (optional)">
                <button onclick="addDevice()">Submit</button>
                <button onclick="hideAddDeviceForm()">Cancel</button>
                <p id="add-error"></p>
            </div>
        </div>
        
    </div>
    
    

    <button onclick="showAddDeviceForm()" class="adddevicebtn" id="addevicebtn"><i class="fa-solid fa-plus addicon"></i></button>
    <footer id="footer" class="footer">
        <button id="homebtn" onclick="showMainScreen()"><i class="fa-solid fa-house footeri"></i></button>
        <button id="settingsbtn" onclick="settings()"><i class="fa-solid fa-gear footeri"></i></button>
    </footer>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
