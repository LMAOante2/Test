<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devices</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="loader1">
  <div class="spinner"></div>
</div>

  <div id="ptr-container" style="top:-80px; position:relative;">
    <div class="ptr-spinner"></div>
  </div>

  <div id="app">
    <div id="login-screen">
      <h1>Login</h1>
      <input style="display: none;" type="text" id="name" placeholder="Name">
      <input style="display: none;" type="text" id="surname" placeholder="Surname">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <p class="noaccountbtn" id="noaccounttxt">Dont have an account yet? <button onclick="makeaccount()">Make one!</button></p>
      <p style="display: none;" class="accountbtn" id="accounttxt">Already have an account? <button onclick="loginbtn()">Login</button></p>
      <button onclick="login()" id="loginbtn">Login</button>
      <button onclick="signup()" id="signupbtn" style="display: none;">Sign Up</button>
      <button onclick="resetPassword()" class="resetbtn">Reset Password</button>
      <button onclick="signInWithGoogle()" class="google"><i class="fa-brands fa-google "></i></button>
      <p id="auth-error"></p>
    </div>

    <div id="info-screen" style="display:none;">
      <h2 id="info-device-name"></h2>
      <div class="profile-image-container">
        <img id="device-img-preview" src="default-device.png" alt="Device Image">
        <label for="device-img-input" class="upload-label"><i class="fa-solid fa-camera"></i></label>
        <input type="file" id="device-img-input" accept="image/*" style="display:none;">
      </div>
      <p id="device-image-error"></p>
<p id="info-sensor"></p>
<div id="control-section" style="display:none;">
  <h4 style="color: white;">Status:<span style="margin-left: 10px;" id="status"></span></h4>
  <button id="toggle-button">Toggle</button>

        <div id="brightness" class="half-circle-slider">
    <label class="brightness-value">Brightness: <span id="brightness-value" style="font-weight: bold;">100%</span></label>
    <input type="range" id="brightness-slider" min="10" max="100" value="100">
  </div>



<div id="schedule-section">
  <p id="schedule-feedback"></p>

  <div class="schedule-row">
    <label for="time-on-picker">ON:</label>
    <input type="time" id="time-on-picker" class="schedule-input">
    <button id="set-time-on-btn" class="schedule-btn">Set ON</button>
  </div>

  <div class="schedule-row">
    <label for="time-off-picker">OFF:</label>
    <input type="time" id="time-off-picker" class="schedule-input">
    <button id="set-time-off-btn" class="schedule-btn">Set OFF</button>
  </div>
</div>

</div>

<div id="dropdown-content" class="dropdown-content">
  <button onclick="deleteDevice()" >Delete Device</button>
</div>

<button onclick="toggleDropdown()" class="dropbtn"><i class="fa-solid fa-ellipsis-vertical" style="color: rgb(0, 0, 0);"></i></button>

      <button class="back" onclick="showMainScreen()"><i class="fa-solid fa-arrow-left backicon"></i></button>
    </div>

    <div id="main-screen" style="display:none;">
      <div id="device-list"></div>

<div id="add-device-modal" style="display: none;">
    <div class="add-device">
<h2>Add Device</h2>

<button id="setupBtn">Setup Device</button>

<br><br>

<iframe 
id="espFrame">
</iframe>

<button onclick="hideAddDeviceForm()" class="close-add-device-btn">Close</button>

    </div>
  </div>
  </div>


      <div id="settings-screen" style="display: none;">
        <div class="settings-header">
          <div class="header-title">Settings</div>
        </div>
        <div class="section-label">Profile settings</div>
        <div class="profile-card">
          <div class="profile-image-container">
            <img id="profile-img-preview" src="default-profile.png" alt="Profile Image">
          </div>
          <div class="profile-info">
            <div id="showname" class="profile-name"></div>
          </div>
          <i class="fa-solid fa-chevron-right chevron"></i>
        </div>
        <p id="profile-error"></p>

        <div class="section-label">Profile</div>
        <div class="list-card">
          <div onclick="profilesettings()" class="list-item">
            <i class="fa-solid fa-user list-icon"></i>
            <span class="list-text">Profile</span>
            <i class="fa-solid fa-chevron-right chevron"></i>
          </div>
        </div>

        <div class="section-label">About</div>
        <div class="list-card">
          <div class="list-item">
            <i class="fa-solid fa-circle-info list-icon" style="color:#ffffff;"></i>
            <span class="list-text">About application</span>
            <i class="fa-solid fa-chevron-right chevron"></i>
          </div>
        </div>

        <div class="section-label">Help</div>
        <div class="list-card" onclick="help()">
          <div class="list-item">
            <i class="fa-solid fa-circle-question list-icon"></i>
            <span class="list-text">Help</span>
            <i class="fa-solid fa-chevron-right chevron"></i>
          </div>
        </div>


      </div>

  <div id="crop-modal" style="display:none;">
    <div class="crop-container">
      <img id="crop-img" src="" alt="">
    </div>
    <button id="crop-btn">Upload</button>
    <button id="cancel-crop">Cancel</button>
  </div>

  <button onclick="showAddDeviceForm()" class="adddevicebtn" id="addevicebtn">
    <i class="fa-solid fa-plus addicon"></i>
  </button>

  <footer id="footer" class="footer" style="display:none;">
    <button id="homebtn" onclick="showMainScreen()"><i class="fa-solid fa-house footeri"></i></button>
    <button id="settingsbtn" onclick="settings()"><i class="fa-solid fa-gear footeri"></i></button>
  </footer>


  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
